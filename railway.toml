[build]
builder = "nixpacks"

[deploy]
startCommand = "python startup.py"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[services]]
name = "carbon-dss-api"
